<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Мониторинг конкурентов</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #22263a;
      --border: #2e3248;
      --text: #e8eaf0;
      --muted: #7880a0;
      --accent: #4f6ef7;
      --accent-hover: #3a58e0;
      --ok: #22c55e;
      --ok-dim: rgba(34,197,94,.15);
      --bad: #ef4444;
      --bad-dim: rgba(239,68,68,.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ─── LOGIN ─── */
    #loginScreen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #loginScreen.hidden { display: none; }

    .login-wrap {
      width: 100%;
      max-width: 340px;
      padding: 20px;
      text-align: center;
    }
    .login-logo {
      font-size: 40px;
      margin-bottom: 20px;
      display: block;
    }
    .login-name {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .login-hint {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .login-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 18px;
      letter-spacing: 6px;
      text-align: center;
      padding: 13px 16px;
      outline: none;
      font-family: inherit;
      margin-bottom: 8px;
    }
    .login-input::placeholder { letter-spacing: 0; font-size: 14px; color: var(--muted); }
    .login-input:focus { border-color: var(--accent); }
    .login-error {
      font-size: 13px;
      color: var(--bad);
      min-height: 18px;
      margin-bottom: 10px;
    }
    .btn-login {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font: 700 15px/1 inherit;
      padding: 14px;
      cursor: pointer;
    }
    .btn-login:hover { background: var(--accent-hover); }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .brand-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .btn-icon {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font: inherit;
      font-size: 14px;
      padding: 6px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── MAIN ─── */
    main {
      max-width: 580px;
      margin: 0 auto;
      padding: 52px 20px 80px;
    }

    /* ─── CENTER BLOCK ─── */
    .center-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
      text-align: center;
    }
    .center-title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -.5px;
      text-align: center;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.1;
    }
    .center-sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 40px;
    }

    /* ─── MONTHS ─── */
    .months-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .month-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .month {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font: 600 13px/1 inherit;
      padding: 9px 16px;
      cursor: pointer;
      transition: all .15s;
    }
    .month:hover { border-color: var(--accent); color: var(--accent); }
    .month.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ─── RUN BUTTON ─── */
    .btn-run {
      display: block;
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font: 700 16px/1 inherit;
      padding: 18px;
      cursor: pointer;
      transition: background .15s;
      margin-bottom: 16px;
    }
    .btn-run:hover { background: var(--accent-hover); }
    .btn-run:disabled { opacity: .45; cursor: wait; }

    /* ─── PROGRESS ─── */
    .progress-wrap {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .progress-wrap.show { display: flex; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-text {
      font-size: 14px;
      color: var(--muted);
      font-weight: 500;
    }

    /* ─── STATUS ─── */
    .status-msg {
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      min-height: 20px;
      color: var(--muted);
    }
    .status-msg.ok { color: var(--ok); }
    .status-msg.bad { color: var(--bad); }

    /* ─── DIVIDER ─── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 40px 0;
    }

    /* ─── RESULT ─── */
    .result { display: none; }
    .result.show { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--ok-dim);
      color: var(--ok);
      border: 1px solid rgba(34,197,94,.25);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      padding: 5px 12px;
    }
    .result-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
    }
    .result-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .result-files {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
      margin-bottom: 20px;
    }
    .file-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-decoration: none;
      display: block;
      transition: border-color .15s;
    }
    .file-card:hover { border-color: var(--accent); }
    .file-card.primary { border-color: var(--accent); background: rgba(79,110,247,.1); }
    .file-icon { font-size: 22px; margin-bottom: 8px; display: block; }
    .file-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      display: block;
      margin-bottom: 2px;
    }
    .file-desc {
      font-size: 11px;
      color: var(--muted);
    }

    iframe {
      width: 100%;
      min-height: 600px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }

    /* ─── SETTINGS DRAWER ─── */
    #settingsDrawer {
      display: none;
      margin-top: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    #settingsDrawer.open { display: block; }
    .drawer-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .competitor {
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
    }
    .competitor:last-child { border-bottom: none; }
    .comp-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .comp-name { font-size: 13px; font-weight: 700; color: var(--text); }
    .comp-domain {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface-2);
      border-radius: 5px;
      padding: 2px 7px;
    }
    .comp-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .comp-fields label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }
    .comp-fields input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font: 12px/1 inherit;
      padding: 7px 10px;
      outline: none;
    }
    .comp-fields input:focus { border-color: var(--accent); }

    @media (max-width: 520px) {
      main { padding: 36px 16px 60px; }
      .result-files { grid-template-columns: 1fr; }
      .comp-fields { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="loginScreen">
  <div class="login-wrap">
    <span class="login-logo">📊</span>
    <div class="login-name">Мониторинг конкурентов</div>
    <div class="login-hint">CheckOffice · внутренний инструмент</div>
    <input class="login-input" id="passwordInput" type="password" placeholder="Код доступа" autocomplete="current-password">
    <div class="login-error" id="loginError"></div>
    <button class="btn-login" id="loginBtn" type="button">Войти →</button>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app" style="display:none">

  <header>
    <div class="brand">
      <div class="brand-dot"></div>
      CheckOffice · мониторинг
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="settingsBtn" type="button">⚙ Источники</button>
    </div>
  </header>

  <main>

    <div class="center-label">Ежемесячный отчёт</div>
    <div class="center-title">Анализ конкурентов</div>
    <div class="center-sub">Выберите месяц — данные по сайтам и соцсетям соберутся автоматически</div>

    <div style="text-align:center; margin-bottom:12px" class="months-label">Месяц</div>
    <div class="month-row" id="months"></div>

    <button class="btn-run" id="mainRun" type="button">Собрать отчёт</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="spinner"></div>
      <div class="progress-text" id="progressText">Запускаю...</div>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <!-- RESULT -->
    <section class="result" id="result">
      <hr class="divider">
      <div class="result-header">
        <span class="result-badge">✓ Готово</span>
      </div>
      <div class="result-title" id="resultTitle">Отчёт собран</div>
      <div class="result-sub" id="resultText"></div>

      <div class="result-files" id="resultFiles"></div>

      <iframe id="preview" title="Предпросмотр"></iframe>
    </section>

    <!-- SETTINGS DRAWER -->
    <div id="settingsDrawer">
      <div class="drawer-title">Источники конкурентов</div>
      <div id="sources"></div>
    </div>

  </main>
</div>

<script>
  // ─── AUTH ───
  const PASS = "453478";

  function tryLogin() {
    const val = document.getElementById("passwordInput").value;
    if (val === PASS) {
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("app").style.display = "block";
      sessionStorage.setItem("mm_auth", "1");
    } else {
      document.getElementById("loginError").textContent = "Неверный код";
      document.getElementById("passwordInput").value = "";
      document.getElementById("passwordInput").focus();
    }
  }

  document.getElementById("loginBtn").addEventListener("click", tryLogin);
  document.getElementById("passwordInput").addEventListener("keydown", e => {
    if (e.key === "Enter") tryLogin();
  });

  if (sessionStorage.getItem("mm_auth") === "1") {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
  }

  // ─── DATA ───
  const MONTHS = [
    ["feb", "Февраль 2026"],
    ["mar", "Март 2026"],
    ["apr", "Апрель 2026"],
    ["may", "Май 2026"],
    ["jun", "Июнь 2026"]
  ];

  const COMPETITORS = [
    { key: "checkoffice",     name: "CheckOffice",       domain: "checkoffice.ru",     site: "https://checkoffice.ru" },
    { key: "mdaudit",         name: "MD Audit",          domain: "mdaudit.ru",         site: "https://mdaudit.ru",         telegram: "@mdaudit" },
    { key: "serviceinspector",name: "Service Inspector", domain: "serviceinspector.ru",site: "https://serviceinspector.ru", telegram: "@SI_chanel" },
    { key: "retailiqa",       name: "Ритейлика",         domain: "retailiqa.ru",       site: "https://retailiqa.ru" },
    { key: "merasoft",        name: "Мерасофт",          domain: "mera-soft.ru",       site: "https://mera-soft.ru" },
    { key: "imredi",          name: "Imredi",            domain: "imredi.biz",         site: "https://imredi.biz" }
  ];

  let selectedMonth = "jun";

  function $(id) { return document.getElementById(id); }

  // ─── MONTHS ───
  function drawMonths() {
    $("months").innerHTML = MONTHS.map(([key, label]) =>
      `<button type="button" class="month ${key === selectedMonth ? "active" : ""}" data-month="${key}">${label}</button>`
    ).join("");
    document.querySelectorAll("[data-month]").forEach(btn => {
      btn.addEventListener("click", () => {
        selectedMonth = btn.dataset.month;
        drawMonths();
      });
    });
  }

  // ─── SOURCES ───
  function drawSources() {
    $("sources").innerHTML = COMPETITORS.map(comp => `
      <div class="competitor" data-source="${comp.key}">
        <div class="comp-header">
          <span class="comp-name">${comp.name}</span>
          <span class="comp-domain">${comp.domain}</span>
        </div>
        <div class="comp-fields">
          <div>
            <label>Сайт</label>
            <input data-field="site" value="${comp.site}">
          </div>
          <div>
            <label>Telegram</label>
            <input data-field="telegram" value="${comp.telegram || ''}" placeholder="@channel">
          </div>
        </div>
      </div>
    `).join("");
  }

  // ─── SETTINGS TOGGLE ───
  $("settingsBtn").addEventListener("click", () => {
    const drawer = $("settingsDrawer");
    drawer.classList.toggle("open");
    $("settingsBtn").textContent = drawer.classList.contains("open") ? "✕ Закрыть" : "⚙ Источники";
    if (drawer.classList.contains("open")) {
      drawer.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  });

  function getSources() {
    const sources = {};
    document.querySelectorAll("[data-source]").forEach(row => {
      const key = row.dataset.source;
      sources[key] = {};
      row.querySelectorAll("[data-field]").forEach(input => {
        sources[key][input.dataset.field] = input.value.trim();
      });
    });
    return sources;
  }

  // ─── RUN ───
  function setRunning(isRunning) {
    $("mainRun").disabled = isRunning;
    $("mainRun").style.display = isRunning ? "none" : "block";
    const pw = $("progressWrap");
    if (isRunning) pw.classList.add("show"); else pw.classList.remove("show");
  }

  function reportLink(path) {
    return "/" + path.replace(/^\/+/, "") + "?v=" + Date.now();
  }

  function showResult(data) {
    const report  = data.report || {};
    const htmlUrl = report.html ? reportLink(report.html) : "";
    const pdfUrl  = report.pdf  ? reportLink(report.pdf)  : "";
    const jsonUrl = report.json ? reportLink(report.json) : "";
    const dlName  = `monitoring-${report.month || selectedMonth}-${report.created || Date.now()}.pdf`;

    const files = [];
    if (pdfUrl) files.push(`
      <a class="file-card primary" href="${pdfUrl}" download="${dlName}">
        <span class="file-icon">📥</span>
        <span class="file-label">Скачать PDF</span>
        <span class="file-desc">Для отправки</span>
      </a>`);
    if (htmlUrl) files.push(`
      <a class="file-card" href="${htmlUrl}" target="_blank" rel="noopener">
        <span class="file-icon">🌐</span>
        <span class="file-label">Открыть отчёт</span>
        <span class="file-desc">В браузере</span>
      </a>`);
    if (jsonUrl) files.push(`
      <a class="file-card" href="${jsonUrl}" target="_blank" rel="noopener">
        <span class="file-icon">📊</span>
        <span class="file-label">Данные JSON</span>
        <span class="file-desc">Сырые цифры</span>
      </a>`);

    $("resultFiles").innerHTML = files.join("");
    $("resultText").textContent = data.pdfError
      ? "HTML готов, PDF не создался: " + data.pdfError
      : "Отчёт и PDF готовы";
    $("preview").src = htmlUrl || "about:blank";
    $("result").classList.add("show");
    $("result").scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function fmtElapsed(ms) {
    const s = Math.floor(ms / 1000);
    return s < 10 ? "" : ` (${Math.floor(s/60)}:${String(s%60).padStart(2,"0")})`;
  }

  async function pollJob(textEl, startTime) {
    const dots = [".", "..", "..."];
    let i = 0, waited = 0;
    const MAX = 600000;
    return new Promise((resolve, reject) => {
      const timer = setInterval(async () => {
        const dot = dots[i++ % dots.length];
        waited += 4000;
        try {
          const r = await fetch("/api/job/current");
          let job;
          try { job = await r.json(); } catch (_) {
            textEl.textContent = "Сервер запускается" + dot; return;
          }
          if (job.status === "running") {
            textEl.textContent = (job.step || "Собираю данные") + dot + fmtElapsed(Date.now() - startTime);
          } else if (job.status === "done") {
            clearInterval(timer); resolve(job);
          } else if ((job.status === "not_found" || r.status === 404) && waited < 30000) {
            textEl.textContent = "Запускаю сбор" + dot;
          } else if (job.status === "error") {
            clearInterval(timer); reject(new Error(job.error || "Ошибка"));
          } else if (waited >= MAX) {
            clearInterval(timer); reject(new Error("Превышено время ожидания"));
          } else {
            clearInterval(timer); reject(new Error("Задача не запустилась"));
          }
        } catch (e) {
          if (waited < 60000) textEl.textContent = "Подключаюсь" + dot;
          else { clearInterval(timer); reject(e); }
        }
      }, 4000);
    });
  }

  async function run() {
    $("statusMsg").className = "status-msg";
    $("statusMsg").textContent = "";
    $("result").classList.remove("show");
    setRunning(true);
    $("progressText").textContent = "Запускаю...";
    const _startTime = Date.now();

    try {
      fetch("/api/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          month: selectedMonth,
          sources: getSources(),
          importText: "",
          manualMetrics: {},
          auth: {}
        })
      }).catch(() => {});

      const job = await pollJob($("progressText"), _startTime);
      showResult(job);
      $("statusMsg").className = "status-msg ok";
      $("statusMsg").textContent = "Готово";
    } catch (err) {
      $("statusMsg").className = "status-msg bad";
      $("statusMsg").textContent = "Ошибка: " + err.message;
    } finally {
      setRunning(false);
    }
  }

  drawMonths();
  drawSources();
  $("mainRun").addEventListener("click", run);
</script>
</body>
</html>
